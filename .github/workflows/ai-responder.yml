name: AI Auto-Responder

on:
  issue_comment:
    types: [created]

jobs:
  ai-reply:
    runs-on: ubuntu-latest
    if: ${{ !github.event.sender.bot }}
    permissions:
      issues: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Generate AI Reply
        uses: actions/github-script@v9
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          script: |
            const commentBody = context.payload.comment.body;
            const author = context.payload.comment.user.login;
            const repoOwner = context.repo.owner;
            const issueNumber = context.issue.number;
            
            console.log(`Received comment from @${author}: "${commentBody}"`);
            
            // Trigger conditions: if the user explicitly tags you or asks a question
            const lowerComment = commentBody.toLowerCase();
            const lowerOwner = repoOwner.toLowerCase();
            const tagsOwner = lowerComment.includes(`@${lowerOwner}`) || lowerComment.includes('@shauryasanyal3');
            const asksQuestion = commentBody.includes('?');
            
            if (!tagsOwner && !asksQuestion) {
              console.log('Skipping comment: does not tag the owner or ask a question.');
              return;
            }
            
            if (!process.env.OPENROUTER_API_KEY) {
              console.error('OPENROUTER_API_KEY secret is not set.');
              return;
            }
            
            console.log('Generating AI response for comment...');
            
            const prompt = `You are a helpful AI co-maintainer for the E-VARA GitHub repository, representing the founder Shaurya.
            A user named @${author} just left a comment on issue #${issueNumber}: "${commentBody}"
            
            Please provide a helpful, welcoming, and concise response. Address them directly. 
            If they are asking a technical question about the repo, do your best to answer based on typical React/Supabase/Tailwind architecture.
            If they are reporting a bug or issue, thank them and assure them the core team will look into it. 
            Keep it professional but friendly.`;

            try {
              const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${process.env.OPENROUTER_API_KEY}`,
                  "HTTP-Referer": "https://github.com/SHAURYASANYAL3/E-vara",
                  "X-Title": "E-VARA Bot",
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  model: "anthropic/claude-3.5-sonnet",
                  messages: [
                    { role: "system", content: "You are a helpful and polite GitHub AI assistant." },
                    { role: "user", content: prompt }
                  ]
                })
              });
              
              const data = await response.json();
              if (data.choices && data.choices.length > 0) {
                let aiResponse = data.choices[0].message.content;
                
                // Add a signature to clarify it's a bot
                aiResponse += "\n\n---\n*🤖 I am an AI assistant replying on behalf of Shaurya. He will review this personally as soon as possible!*";
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: aiResponse
                });
                console.log("Successfully posted AI response.");
              } else {
                console.error("No completion returned:", data);
              }
            } catch (error) {
              console.error("Error calling OpenRouter API:", error);
            }
