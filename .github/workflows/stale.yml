name: "Close Stale Issues"
on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been quiet for a while and is marked as stale. Is anyone still working on this? It will be closed in 7 days if there is no activity."
          stale-pr-message: "This PR has been quiet for a while and is marked as stale. Please let us know if it is still ready for review! It will be closed in 7 days if there is no activity."
          stale-issue-label: "stale 🕒"
          stale-pr-label: "stale 🕒"
          days-before-stale: 30
          days-before-close: 7
