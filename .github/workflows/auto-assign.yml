name: Auto-Assign Issue

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    if: ${{ !github.event.issue.pull_request && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - name: Assign first commenter
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            // 1. Fetch current issue to check assignees accurately
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // 2. Only proceed if the issue is completely unassigned
            if (issue.data.assignees && issue.data.assignees.length > 0) {
              console.log("Issue is already assigned. Skipping auto-assign.");
              return;
            }
            
            // Skip if the commenter is a bot
            if (context.payload.comment.user.type === "Bot") {
              console.log("Commenter is a bot. Skipping.");
              return;
            }
            
            const commenter = context.payload.comment.user.login;
            
            try {
              // 3. Assign the user
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [commenter]
              });
              
              // 4. Send a welcome comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🚀 Assigned to @${commenter}! Thanks for taking this on. Please let us know if you need any help!`
              });
            } catch (error) {
              console.log("Failed to assign user. Note: users must be a member of the organization or have prior activity to be assigned via API in some cases.", error);
            }
